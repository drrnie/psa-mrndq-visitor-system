name: psa_visitor_app
description: PSA Marinduque Provincial Statistical Office - Visitor Logging System
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^5.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  crypto: ^3.0.3
  shared_preferences: ^2.5.5
  sensors_plus: ^7.0.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.8.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/Visitor App Logo.png"